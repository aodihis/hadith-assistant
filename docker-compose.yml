services:
  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hadith-assistant-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/hadiths
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: ${SERVER_PORT:-3000}
      VECTOR_DB_PROVIDER: ${VECTOR_DB_PROVIDER:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-hadith_vectors}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${SERVER_PORT:-3000}:${SERVER_PORT:-3000}"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: hadith-assistant-postgres
    environment:
      POSTGRES_DB: hadiths
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hadiths"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    build:
      context: .
      dockerfile: docker/qdrant/Dockerfile
    container_name: hadith-assistant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_storage:
