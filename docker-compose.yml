services:
  postgres:
    image: postgres:17-alpine
    container_name: hadith-assistant-postgres
    environment:
      POSTGRES_DB: hadiths
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hadiths"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    build:
      context: .
      dockerfile: docker/qdrant/Dockerfile
    container_name: hadith-assistant-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_storage:
